name: 🔗 Links & Spelling Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  spell-check:
    name: 🔗🪄 Check Links & Spelling
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📚 Git checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: 🔗 Link checker
        uses: tcort/github-action-markdown-link-check@v1.1.2
        with:
          base-branch: main
          use-quiet-mode: "yes"
          check-modified-files-only: "yes"

      - name: 🪄 Spell check
        uses: streetsidesoftware/cspell-action@v8.4.0
        with:
          config: .github/workflows/config/spell_check/cspell.json
          incremental_files_only: true
          files: "**/*.{md,dart,rs}"
